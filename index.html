// --- CAMERA ---
async function activerCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    
    const video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;

    video.style.position = "fixed";
    video.style.top = "0";
    video.style.left = "0";
    video.style.width = "100vw";
    video.style.height = "100vh";
    video.style.objectFit = "cover";
    video.style.zIndex = "-1"; // derrière tout
    video.style.filter = "contrast(100%) saturate(150%)";

    document.body.appendChild(video);


  } catch (err) {
    console.error("Erreur caméra :", err);
  }
}

activerCamera();

function declencherContenu(lettre) {
  const titre = document.getElementById("mot");
  titre.textContent = "";

  if (!contenus[lettre]) return;

  let element = contenus[lettre];

  // Si c'est un tableau (comme pour p), on choisit au hasard
  if (Array.isArray(element)) {
    element = element[Math.floor(Math.random() * element.length)];
  }

    // --- MOT ---
    if (element.type === "mot") {
      const mot = document.createElement("div");
      mot.textContent = element.valeur;

      mot.style.position = "absolute";
      mot.style.fontSize = "40px";
      mot.style.color = "#fa3f02";

      mot.style.left = Math.random() * (window.innerWidth - 200) + "px";
      mot.style.top = Math.random() * (window.innerHeight - 50) + "px";

      document.body.appendChild(mot);

      setTimeout(function() {
        mot.remove();
      }, 500);
    }

    // --- VIDEO ---
    if (element.type === "video") {
      const video = document.createElement("video");
      video.src = element.valeur;
      video.autoplay = true;
      video.width = 300;

      video.style.position = "absolute";
      video.style.left = Math.random() * (window.innerWidth - 300) + "px";
      video.style.top = Math.random() * (window.innerHeight - 200) + "px";

      document.body.appendChild(video);

      video.onended = function() {
        video.remove();
      };
    }

    // --- IMAGE ---
    if (element.type === "image") {
      const img = document.createElement("img");
      img.src = element.valeur;
      img.style.width = "200px";
      img.style.position = "absolute";
      img.style.left = Math.random() * (window.innerWidth - 200) + "px";
      img.style.top = Math.random() * (window.innerHeight - 200) + "px";

      document.body.appendChild(img);

      // Supprimer l'image après 1 seconde
      setTimeout(() => img.remove(), 1000);
    }
}

// --- ORDI ---
document.addEventListener("keydown", function(event) {
